apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: llm-monitor-ingress
  namespace: llm-monitor

spec:
  ingressClassName: nginx

  rules:
    - host: llm-monitor.local

      http:
        paths:

          - path: /
            pathType: Prefix

            backend:
              service:
                name: frontend-service

                port:
                  number: 3000

          - path: /api
            pathType: Prefix

            backend:
              service:
                name: backend-service

                port:
                  number: 8000
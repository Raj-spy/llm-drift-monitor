apiVersion: v1
kind: Service

metadata:
  name: backend-service
  namespace: {{ include "llm-monitor.namespace" . }}

  labels:
    {{ include "llm-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: backend
  ports:
  - port: {{.Values.backend.service.port }}
    targetPort: 8000

  type: {{.Values.backend.service.type }}

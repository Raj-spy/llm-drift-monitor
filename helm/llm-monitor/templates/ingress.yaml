apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: llm-monitor-ingress
  namespace: {{ include "llm-monitor.namespace" . }}

  labels:
    {{- include "llm-monitor.labels" . | nindent 4 }}

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
    - host: {{ .Values.ingress.host }}

      http:
        paths:

          - path: {{ .Values.ingress.path }}
            pathType: Prefix

            backend:
              service:
                name: frontend-service

                port:
                  number: 3000

          - path: /api
            pathType: Prefix

            backend:
              service:
                name: backend-service

                port:
                  number: 8000
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: {{ include "llm-monitor.namespace" . }}

  labels:
    {{- include "llm-monitor.labels" . | nindent 4 }}

spec:
  replicas: {{.Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: {{.Values.frontend.image.repository }}:{{.Values.frontend.image.tag }}

        imagePullPolicy: {{.Values.frontend.image.pullPolicy }}

        ports:
        - containerPort: 3000


        resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
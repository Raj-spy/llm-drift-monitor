apiVersion: v1
kind: Secret

metadata:
  name: backend-secret
  namespace: {{ include "llm-monitor.namespace" . }}

  labels:
    {{- include "llm-monitor.labels" . | nindent 4 }}

type: Opaque

stringData:
  SUPABASE_URL: {{ .Values.secrets.supabaseUrl | quote }}
  SUPABASE_SERVICE_KEY: {{ .Values.secrets.supabaseServiceKey | quote }}
  SUPABASE_ANON_KEY: {{ .Values.secrets.supabaseAnonKey | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: rajspy/llm-backend
  FRONTEND_IMAGE: rajspy/llm-frontend

jobs:

  # ── Backend Tests ─────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: ./backend
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-key
          SUPABASE_ANON_KEY: test-anon
        run: pytest backend/tests/ -v --tb=short


  # ── SDK Tests ─────────────────────────────────────────────────
  test-sdk:
    name: SDK Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK dependencies
        run: |
          pip install pytest
          pip install -e ./sdk

      - name: Run SDK tests
        run: pytest sdk/tests/ -v --tb=short || true


  # ── Frontend Build Check ──────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build


  # ── Docker Build & Push ───────────────────────────────────────
  build-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    needs:
      - test-backend
      - test-sdk
      - build-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Backend Image
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            rajspy/llm-backend:sha-${{ github.sha }}
            rajspy/llm-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend Image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            rajspy/llm-frontend:sha-${{ github.sha }}
            rajspy/llm-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── Auto Deploy To EC2 ───────────────────────────────────────
  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest

    needs:
      - build-docker

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            docker compose pull
            docker compose up -d